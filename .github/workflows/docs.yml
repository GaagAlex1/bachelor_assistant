name: Documentation

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.md'
      - 'document_processor/**/*.py'
      - 'vector_store/**/*.py'
      - 'api/**/*.py'

jobs:
  # ============================================
  # GENERATE API DOCS
  # ============================================
  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydoc-markdown mkdocs mkdocs-material

      - name: Generate API documentation
        run: |
          # Generate documentation from docstrings
          pip install pdoc
          pdoc --html --output-dir docs/ document_processor/ vector_store/ api/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true

  # ============================================
  # CHECK DOCS QUALITY
  # ============================================
  check-docs:
    name: Check Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for TODOs
        run: |
          grep -r "TODO" --include="*.py" document_processor/ vector_store/ api/ || true

      - name: Check docstrings
        run: |
          pip install interrogate
          interrogate document_processor/ vector_store/ api/ -v --ignore-init-method --ignore-module --fail-under=80 || true
