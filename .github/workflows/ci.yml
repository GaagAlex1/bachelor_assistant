name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: false
          tags: document-processor:${{ github.sha }}

      - name: Health check
        run: |
          docker run --rm document-processor:${{ github.sha }} \
            python -c "from api.main import app; print('OK')"
